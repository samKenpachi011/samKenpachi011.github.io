
title: Sam Kenpachi
description: >-
  This is where I share anything I learn about life, development , devops and general tech.
author: ''
url: "https://samKenpachi011.github.io"
# timezone: Africa/Windhoek
show_excerpts: true
permalink: /:categories/:title

# Social
twitter_username: samuel_kabelo
linkedin_username: samuel kabelo
github_username: samKenpachi011
rss: rss

header_pages:
  - links.md
  - subscriptions.md
  - blogs.md
  - articles.md

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-github-metadata
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-octicons

defaults:
  - scope:
      path: ""
      type: "blog-post"
    values:
      layout: post
  - scope:
      path: _drafts
    values:
      layout: post
      comments: false

# Build drafts
collections:
  drafts:
    output: true
    permalink: /drafts/:path/

  # External Stories Collection
  external_stories:
    output: true
    permalink: /stories/:title/
# Projects
projects:
  sort_by: pushed
  sort_by options:
    - pushed
    - stars
  limit: 12
  exclude:
    archived: true
    forks: true
    projects:
    # - repo-name

