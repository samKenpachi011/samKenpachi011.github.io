{% include header.html %}


<div class="page-overlay articles-background">


  <div class="mx-auto mt-10" style="max-width: 800px;">


    <article class="bento-card bento-card--post" style="background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; padding: 3rem; margin-bottom: 3rem; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">


      <header class="mb-5 text-center">
        <a href="{{ site.baseurl }}/" class="d-inline-flex align-items-center text-decoration-none mb-3" style="color: #666; font-size: 0.9rem; transition: color 0.2s;">
          {% octicon chevron-left height:16 class:"mr-1" %} Back to Home
        </a>
        <h1 class="f00-light lh-condensed mb-2" style="font-weight: 800; letter-spacing: -0.5px; color: #24292e;">{{ page.title | default: "Articles & Reading List" }}</h1>
        <p class="text-gray f5" style="color: #586069;">A collection of thoughts, tutorials, and things I've read recently.</p>
      </header>


      <div class="article-content f4" style="line-height: 1.8; color: #24292e;">
        {{ content }}
      </div>

    </article>


    {% include articles.html %}

  </div>

</div>

{% include footer.html %}
