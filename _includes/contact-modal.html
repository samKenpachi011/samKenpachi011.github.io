
 <style>

    /* =========================================
   Contact Modal (Glassmorphism)
   ========================================= */
.modal-backdrop {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(5px);
  z-index: 999;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;

  &.active {
    opacity: 1;
    visibility: visible;
  }
}

.contact-modal {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  width: 90%;
  max-width: 400px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 24px;
  padding: 2.5rem;
  z-index: 1000;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);

  &.active {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
  }
}

.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none;
  border: none;
  font-size: 2rem;
  line-height: 1;
  cursor: pointer;
  color: #666;
  transition: color 0.2s;

  &:hover { color: #000; }
}

.modal-title {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  margin: 0 0 8px 0;
  color: #111;
}

.modal-desc {
  color: #555;
  font-size: 0.95rem;
  margin: 0 0 24px 0;
  line-height: 1.5;
}

.modal-socials {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 24px;
}

.modal-social-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(0, 0, 0, 0.03);
  border-radius: 12px;
  text-decoration: none;
  color: #24292e;
  font-weight: 500;
  transition: all 0.2s ease;

  &:hover {
    background: rgba(0, 0, 0, 0.08);
    transform: translateX(4px);
  }
}

.modal-divider {
  height: 1px;
  background: rgba(0, 0, 0, 0.1);
  margin: 0 0 20px 0;
}

.modal-subscribe-link {
  display: block;
  text-align: center;
  color: #0366d6;
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;

  &:hover { text-decoration: underline; }
}
 </style>
<div class="modal-backdrop" id="modal-backdrop"></div>

<div class="contact-modal" id="contact-modal">
  <button class="modal-close" id="close-contact-modal" aria-label="Close">&times;</button>

  <h3 class="modal-title">Let's Connect</h3>
  <p class="modal-desc">Available for collaboration, consulting, and product partnerships.</p>

  <div class="modal-socials">

    <a href="https://github.com/samKenpachi011" target="_blank" class="modal-social-link">
      {% octicon mark-github height:20 %} Github / Follow
    </a>
    <a href="https://twitter.com/samuel_kabelo" target="_blank" class="modal-social-link">
      {% octicon mention height:20 %} Twitter / X
    </a>

    <a href="https://www.instagram.com/samuelkabelo1/" target="_blank" class="modal-social-link">
      {% octicon people height:20 %} Instagram / Follow
    </a>

  </div>

  <div class="modal-divider"></div>

  <a href="{{ site.baseurl }}/#footer-section" class="modal-subscribe-link" onclick="document.getElementById('contact-modal').classList.remove('active'); document.getElementById('modal-backdrop').classList.remove('active');">
    Or subscribe to my newsletter &rarr;
  </a>
</div>
