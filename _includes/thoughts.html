
<div id="thoughts" class="my-thoughts-section text-white mt-6">
  <h2 class="text-white mb-2" style="font-weight: 700; letter-spacing: -0.5px;">My Thoughts</h2>

    <span class="post-count-badge" style="background: rgba(255, 255, 255, 0.15); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; backdrop-filter: blur(5px);">
      {{ site.posts | size }} posts
    </span>
  <p class="f4 mb-4 text-white opacity-75">Articles I've written.</p>

  <div class="d-sm-flex flex-wrap gutter-condensed mb-4">
    {% for post in site.posts limit: 6 %}

      {% unless post.url == page.url %}
        <div class="col-sm-6 col-md-12 col-lg-6 col-xl-4 mb-3">
          {% include post-card.html %}
        </div>
      {% endunless %}
    {% endfor %}


  </div>
</div>
